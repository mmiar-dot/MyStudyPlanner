<!DOCTYPE html>
<html>
<head>
    <title>Aperçu Icône MyStudyPlanner</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .preview-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preview-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .preview-box h3 {
            margin: 0 0 20px 0;
            color: #333;
        }
        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .icon-size {
            text-align: center;
        }
        .icon-size img {
            border-radius: 22%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .icon-size p {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .description {
            color: white;
            margin-top: 30px;
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <h1>🎨 Aperçu de l'icône MyStudyPlanner</h1>
    
    <div class="preview-container">
        <div class="preview-box">
            <h3>Icône de l'application</h3>
            <div class="icon-wrapper">
                <div class="icon-size">
                    <img src="/apps/mobile/assets/images/icon_preview.png" width="256" height="256" alt="Icon 256px">
                    <p>256x256</p>
                </div>
                <div class="icon-size">
                    <img src="/apps/mobile/assets/images/icon_preview.png" width="128" height="128" alt="Icon 128px">
                    <p>128x128</p>
                </div>
                <div class="icon-size">
                    <img src="/apps/mobile/assets/images/icon_preview.png" width="64" height="64" alt="Icon 64px">
                    <p>64x64</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="description">
        <p><strong>Design :</strong> Livre ouvert vers le haut (comme en lecture)</p>
        <p><strong>Couleurs :</strong> Livre bleu (#3B82F6) sur fond bleu pâle (#DBEAFE)</p>
    </div>
</body>
</html>
