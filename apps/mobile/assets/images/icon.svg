<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Pale blue with iOS-style rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="#DBEAFE"/>
  
  <!-- Open Book Icon - Blue (#3B82F6) - Book opens upward like reading -->
  <g transform="translate(512, 540)">
    <!-- Left page - opens upward to the left -->
    <path d="M-20 60 
             Q-20 -100 -160 -180
             L-260 -180
             Q-300 -180 -300 -140
             L-300 140
             Q-300 180 -260 180
             L-60 180
             Q-20 180 -20 140
             Z" 
          fill="#3B82F6"/>
    
    <!-- Right page - opens upward to the right -->
    <path d="M20 60 
             Q20 -100 160 -180
             L260 -180
             Q300 -180 300 -140
             L300 140
             Q300 180 260 180
             L60 180
             Q20 180 20 140
             Z" 
          fill="#3B82F6" fill-opacity="0.85"/>
    
    <!-- Center spine/binding -->
    <ellipse cx="0" cy="180" rx="25" ry="12" fill="#1D4ED8"/>
  </g>
</svg>
