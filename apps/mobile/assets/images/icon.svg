<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="220" fill="#3B82F6"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="1024" height="1024" rx="220" fill="url(#gradient)"/>
  
  <!-- Open Book Icon -->
  <g transform="translate(200, 250)">
    <!-- Left page -->
    <path d="M312 0C312 0 200 20 100 60C50 80 20 100 20 140V460C20 480 35 495 55 490C155 460 280 440 312 440V0Z" fill="white" fill-opacity="0.95"/>
    
    <!-- Right page -->
    <path d="M312 0C312 0 424 20 524 60C574 80 604 100 604 140V460C604 480 589 495 569 490C469 460 344 440 312 440V0Z" fill="white" fill-opacity="0.85"/>
    
    <!-- Center spine line -->
    <path d="M312 0V440" stroke="rgba(59, 130, 246, 0.3)" stroke-width="4"/>
    
    <!-- Page lines left -->
    <path d="M80 160H260" stroke="rgba(59, 130, 246, 0.2)" stroke-width="12" stroke-linecap="round"/>
    <path d="M80 220H240" stroke="rgba(59, 130, 246, 0.2)" stroke-width="12" stroke-linecap="round"/>
    <path d="M80 280H220" stroke="rgba(59, 130, 246, 0.2)" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Page lines right -->
    <path d="M364 160H544" stroke="rgba(59, 130, 246, 0.15)" stroke-width="12" stroke-linecap="round"/>
    <path d="M384 220H544" stroke="rgba(59, 130, 246, 0.15)" stroke-width="12" stroke-linecap="round"/>
    <path d="M404 280H544" stroke="rgba(59, 130, 246, 0.15)" stroke-width="12" stroke-linecap="round"/>
  </g>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1024" y2="1024">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
</svg>
