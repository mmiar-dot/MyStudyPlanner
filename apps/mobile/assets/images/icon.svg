<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Pale blue with iOS-style rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="#DBEAFE"/>
  
  <!-- Open Book Icon - Blue (#3B82F6) on light blue background -->
  <!-- Matches the exact design from the reference image -->
  <g transform="translate(512, 512)">
    <!-- Left page - curved bottom edge -->
    <path d="M-30 -180 
             L-30 140 
             Q-30 180 -70 200 
             L-240 200 
             Q-280 200 -280 160 
             L-280 -140 
             Q-280 -180 -240 -180 
             Z" 
          fill="#3B82F6"/>
    
    <!-- Right page - curved bottom edge -->
    <path d="M30 -180 
             L30 140 
             Q30 180 70 200 
             L240 200 
             Q280 200 280 160 
             L280 -140 
             Q280 -180 240 -180 
             Z" 
          fill="#3B82F6"/>
  </g>
</svg>
